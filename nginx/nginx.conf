events { worker_connections 1024; }

http {
  upstream api   { server server:3001; }
  upstream app   { server client:80; }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name signage.southeastcouncil.com;

    ssl_certificate     /etc/letsencrypt/live/signage.southeastcouncil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/signage.southeastcouncil.com/privkey.pem;

    client_max_body_size 512M;

    # REST API
    location /api/ {
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Media file delivery
    location /media/ {
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    # React SPA
    location / {
      proxy_pass         http://app;
      proxy_set_header   Host $host;
    }
  }

  server {
    listen 443 ssl;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    client_max_body_size 512M;

    # REST API
    location /api/ {
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Media file delivery
    location /media/ {
      proxy_pass         http://api;
      proxy_set_header   Host $host;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    # React SPA
    location / {
      proxy_pass         http://app;
      proxy_set_header   Host $host;
    }
  }

  server {
    listen 443 ssl;
    server_name collage.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/collage.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/collage.your-domain.com/privkey.pem;

    client_max_body_size 512M;

    # Serve the static website
    location / {
      root /collage_project/www;
      index index.html;
      try_files $uri $uri/ =404;
    }

    # Proxy webhook execution API to host port 7869
    location /hooks/ {
      proxy_pass http://host.docker.internal:7869/hooks/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Access-Control-Allow-Origin *;
    }

    # Serve status.json dynamically
    location = /api/collage-status {
      alias /collage_project/status.json;
      default_type application/json;
      add_header Cache-Control "no-cache, must-revalidate";
    }
  }
}
