name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: signage
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # Build and Test Backend Server
      - name: Install Server Dependencies
        run: npm --prefix server ci

      - name: Prisma Client Generation
        run: npm --prefix server run db:generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/signage

      - name: Build Server
        run: npm --prefix server run build

      - name: Run Server Unit Tests
        run: npm --prefix server run test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/signage

      # Build and Test Frontend Client
      - name: Install Client Dependencies
        run: npm --prefix client ci

      - name: Build Client
        run: npm --prefix client run build

      - name: Run Client Unit Tests
        run: npm --prefix client run test
